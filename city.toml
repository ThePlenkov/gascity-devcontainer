[workspace]

[providers]
[providers.devin]
command = "devin"
acp_command = "devin"
acp_args = ["acp"]
supports_acp = true
resume_flag = "--resume"

[providers.claude]
command = "echo"
acp_command = "echo"
acp_args = ["acp-mode"]
supports_acp = true

[session.acp]
handshake_timeout = "60s"
nudge_busy_timeout = "120s"

[[agent]]
name = "devin"
prompt_template = ".gc/system/packs/core/assets/prompts/pool-worker.md"
provider = "devin"
session = "acp"
default_sling_formula = "mol-do-work"

[[agent]]
name = "test-claude"
provider = "claude"
session = "acp"
default_sling_formula = "mol-do-work"

[beads]
provider = "file"
