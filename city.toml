[workspace]

[providers]

[providers.devin]
command = "sacp-conductor"
ready_delay_ms = 0
supports_acp = true
resume_flag = "--resume"
acp_command = "sacp-conductor"
acp_args = ["agent", "--name", "devin", "devin acp"]

[providers.devin-tmux]
command = "devin"
ready_delay_ms = 0
resume_flag = "--resume"
args = ["--model", "swe-1.6"]

[beads]
provider = "file"

[session]
[session.acp]
handshake_timeout = "60s"
nudge_busy_timeout = "120s"
output_buffer_lines = 0
